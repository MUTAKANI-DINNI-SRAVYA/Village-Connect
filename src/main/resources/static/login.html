<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - VillageConnect</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="css/styles.css" rel="stylesheet">
</head>
<body class="bg-light">

    <!-- Header Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
                <i class="bi bi-shop-window fs-3 text-warning"></i>
                <span data-translate="appName" class="brand-font">VillageConnect</span>
            </a>
            <div class="d-flex align-items-center gap-3">
                <!-- Language Switches -->
                <div class="btn-group btn-group-sm" role="group">
                    <button type="button" class="btn btn-light" id="btn-lang-en">English</button>
                    <button type="button" class="btn btn-outline-light" id="btn-lang-te">తెలుగు</button>
                </div>
                <a href="index.html" class="btn btn-outline-light btn-sm"><i class="bi bi-arrow-left"></i> <span data-translate="home">Home</span></a>
            </div>
        </div>
    </nav>

    <!-- Login Container -->
    <main class="container my-5 flex-grow-1 d-flex align-items-center justify-content-center">
        <div class="row w-100 justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card glass-panel border-0 shadow-lg p-4">
                    <div class="text-center mb-4">
                        <div class="bg-teal text-white rounded-circle d-inline-flex align-items-center justify-content-center" style="width: 70px; height: 70px; background-color: #0f766e;">
                            <i class="bi bi-shield-lock-fill fs-2"></i>
                        </div>
                        <h2 class="fw-bold mt-3" data-translate="welcomeBack">Welcome Back</h2>
                        <p class="text-muted" data-translate="signInSubtitle">Sign in to search shops and manage orders</p>
                    </div>

                    <!-- Alert Container -->
                    <div id="alert-container"></div>

                    <!-- Login Form -->
                    <form id="login-form">
                        <div class="mb-3">
                            <label for="email" class="form-label fw-semibold" data-translate="emailAddress">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                <input type="email" id="email" class="form-control" data-translate="emailPlaceholder" placeholder="name@example.com" required>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label for="password" class="form-label fw-semibold" data-translate="passwordLabel">Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                <input type="password" id="password" class="form-control" data-translate="passwordPlaceholder" placeholder="Enter password" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-3 fw-bold rounded-3" data-translate="signInBtn">Sign In</button>
                    </form>

                    <div class="text-center mt-4">
                        <p class="mb-0 text-muted"><span data-translate="dontHaveAccount">Don't have an account?</span> <a href="register.html" class="text-teal fw-semibold" style="color:#0f766e" data-translate="registerHere">Register here</a></p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="text-center text-lg-start mt-auto py-3">
        <div class="container text-center">
            <small>&copy; 2026 VillageConnect. All Rights Reserved.</small>
        </div>
    </footer>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Core App JS -->
    <script src="js/app.js"></script>

    <!-- Login Handler Script -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // If already authenticated, redirect immediately
            if (auth.isAuthenticated()) {
                redirectUser();
            }

            const loginForm = document.getElementById('login-form');
            const alertContainer = document.getElementById('alert-container');

            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                alertContainer.innerHTML = ''; // Clear alerts

                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value.trim();

                try {
                    // Call authentication API
                    const data = await apiCall('/auth/login', {
                        method: 'POST',
                        body: JSON.stringify({ email, password })
                    });

                    if (data && data.token) {
                        // Store credentials
                        auth.setToken(data.token, {
                            id: data.id,
                            name: data.name,
                            email: data.email,
                            role: data.role,
                            village: data.village
                        });
                        
                        redirectUser();
                    }
                } catch (err) {
                    alertContainer.innerHTML = `
                        <div class="alert alert-danger alert-dismissible fade show" role="alert">
                            <i class="bi bi-exclamation-octagon-fill me-2"></i> ${err.message}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                    `;
                }
            });

            function redirectUser() {
                // Check if redirect query param exists
                const urlParams = new URLSearchParams(window.location.search);
                const redirect = urlParams.get('redirect');
                if (redirect) {
                    window.location.href = redirect;
                    return;
                }

                // Redirect to home page
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
