# Server Port Configuration
server.port=${PORT:8080}

# Database Configuration (PostgreSQL on Render, MySQL locally)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/villageconnect?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:dinni123}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:com.mysql.cj.jdbc.Driver}

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_DIALECT:org.hibernate.dialect.MySQLDialect}

# JWT Configurations
jwt.secret=VillageConnectSuperSecretKeyThatIsVeryLongAndSecure1234567890!
jwt.expirationMs=86400000

# Gemini API Integration
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent

# File Upload configuration (optional, for profile pictures / product images)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
